<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RunningX">
<meta name="theme-color" content="#0d0d0d">
<title>RunningX</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--surface:#181818;--border:#2e2e2e;
  --accent:#d4f542;--accent2:#ff6b35;--accent3:#42d4f5;
  --text:#ededed;--muted:#888;--faint:#4a4a4a;
  /* C25: standardised type colours */
  --run-bg:rgba(76,175,80,0.14);   --run-text:#4CAF50;
  --str-bg:rgba(33,150,243,0.14);  --str-text:#2196F3;
  --mob-bg:rgba(0,188,212,0.14);   --mob-text:#00BCD4;
  --rest-bg:rgba(158,158,158,0.12);--rest-text:#9E9E9E;
  --race-bg:rgba(244,67,54,0.14);  --race-text:#F44336;
  --work-bg:rgba(255,193,7,0.14);  --work-text:#FFC107;
  --herstel-bg:rgba(156,39,176,0.14);--herstel-text:#9C27B0;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;height:100%;overscroll-behavior:none}

.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--st) + 12px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;gap:8px}
/* U24: RunningX logo — "RUNNING" in text, "X" in accent, Bebas Neue */
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;line-height:1;flex-shrink:0;display:flex;align-items:baseline;gap:0}
.topbar-logo .logo-running{color:var(--text);letter-spacing:2px}
.topbar-logo .logo-x{color:var(--accent);font-size:19px;letter-spacing:0}
.topbar-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:0.5px;margin-top:1px}
.topbar-races{display:flex;gap:0;flex:1;min-width:0;overflow:hidden}
.race-chip{display:flex;flex-direction:column;padding:5px 10px;min-width:0;flex-shrink:0;border-right:1px solid var(--border)}
.race-chip:first-child{border-left:1px solid var(--border)}
.race-chip.main-chip .rc-name{color:var(--accent);font-weight:600}
.race-chip.main-chip .rc-cd{color:var(--accent)}
.rc-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;line-height:1.2}
.rc-cd{font-family:'Bebas Neue',sans-serif;font-size:16px;line-height:1;color:var(--muted)}
.rc-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--faint);letter-spacing:0.5px}
.race-chip-add{display:flex;align-items:center;justify-content:center;padding:6px 10px;color:var(--faint);font-size:16px;cursor:pointer;flex-shrink:0;border-right:1px solid var(--border);transition:color 0.15s}
.race-chip-add:hover{color:var(--accent)}
.race-chip-add:first-child{border-left:1px solid var(--border)}
.topbar-gear{background:none;border:none;cursor:pointer;color:var(--faint);font-size:18px;padding:0;flex-shrink:0;line-height:1;transition:color 0.15s}
.topbar-gear:hover{color:var(--muted)}

/* UPDATE BANNER */
.update-banner{background:var(--accent);color:#000;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;cursor:pointer;letter-spacing:0.5px}
.update-banner button{background:none;border:1px solid rgba(0,0,0,0.25);border-radius:4px;padding:4px 10px;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;color:#000;letter-spacing:0.5px}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overscroll-behavior:contain;padding-bottom:calc(var(--sb) + 80px);-webkit-overflow-scrolling:touch}
.view{display:none;padding:16px;animation:fadeIn 0.18s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:10px}
.card.faded{opacity:0.65}
.card.work-border{border-color:rgba(255,193,7,0.35)}
.card.race-border{border-color:rgba(244,67,54,0.35)}
.card.accent-border{border-color:rgba(212,245,66,0.28)}
.card-pad{padding:14px 16px}
.badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;display:inline-block}

/* TODAY */
.today-header{margin-bottom:18px}
.today-date-big{font-family:'DM Sans',sans-serif;font-size:28px;font-weight:300;letter-spacing:-0.5px;line-height:1;color:var(--muted)}
.today-phase-line{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:0.5px;margin-top:4px;opacity:0.8}
.tc-top{display:flex;align-items:center;gap:12px;padding:14px 16px 10px}
.tc-emoji{font-size:32px;flex-shrink:0}
.tc-main{flex:1;min-width:0}
.tc-type{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tc-title{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;letter-spacing:0.5px}
.tc-metric{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);margin-top:5px}
.tc-detail{padding:10px 16px 14px;font-size:12px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border)}
.rest-card-inner{padding:16px 18px;display:flex;gap:14px;align-items:center}
.rest-emoji{font-size:36px;flex-shrink:0}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.5px;margin-bottom:4px}
.rest-sub{font-size:12px;color:var(--muted);line-height:1.5}
.mob-reminder{background:rgba(0,188,212,0.05);border:1px solid rgba(0,188,212,0.15);border-radius:6px;padding:12px 14px;margin-top:4px}
.mob-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--mob-text);text-transform:uppercase;margin-bottom:4px}
.mob-text{font-size:12px;color:var(--muted)}
.tmr-card{padding:12px 16px;opacity:0.65}
.tmr-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.tmr-row{display:flex;align-items:center;gap:10px}
.tmr-title{font-size:14px;font-weight:600;flex:1}
.tmr-metric{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent)}
.no-connection-hint{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:10px}
.nch-icon{font-size:20px;flex-shrink:0;opacity:0.5}
.nch-text{font-size:12px;color:var(--muted);line-height:1.45}
.nch-link{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:0.5px;margin-top:3px}

/* FEEDBACK */
.feedback-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.feedback-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.feedback-stars{display:flex;gap:8px;margin-bottom:12px}
.star-btn{width:42px;height:42px;border:1px solid var(--border);background:var(--bg);border-radius:6px;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.12s,background 0.12s,border-color 0.12s}
.star-btn.active{background:rgba(76,175,80,0.15);border-color:var(--run-text);transform:scale(1.08)}
.star-btn:active{transform:scale(0.94)}
.feedback-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;resize:none;height:72px;margin-bottom:10px;outline:none;transition:border-color 0.15s}
.feedback-textarea:focus{border-color:var(--accent)}
.feedback-textarea::placeholder{color:var(--faint)}
.prev-feedback{background:rgba(76,175,80,0.05);border:1px solid rgba(76,175,80,0.2);border-radius:6px;padding:10px 14px;margin-bottom:10px}
.prev-feedback-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.prev-feedback-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--run-text);opacity:0.8}
.prev-feedback-text{font-size:12px;color:var(--muted);line-height:1.5}
.edit-link{background:none;border:none;color:var(--accent);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.btn-primary{width:100%;background:var(--accent);color:#000;border:none;border-radius:6px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background 0.12s,transform 0.12s}
.btn-primary:hover{background:#c8ec30}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{width:100%;margin-top:8px;background:none;border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:border-color 0.12s,color 0.12s}
.btn-secondary:hover{border-color:var(--muted);color:var(--text)}

/* WEEK */
.week-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.week-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 10px;text-align:center}
.week-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.week-stat-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:1px;margin-top:2px}
.progress-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:10px}
.progress-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-bar-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:1px;text-transform:uppercase}
.progress-bar-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent)}
.progress-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--run-text);border-radius:3px;transition:width 0.5s ease}
.progress-bar-footer{display:flex;justify-content:space-between;margin-top:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--faint)}
.day-tiles{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.day-tile{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 4px;text-align:center}
.day-tile.is-today{border-color:rgba(212,245,66,0.5);background:rgba(212,245,66,0.05)}
.day-tile.is-past{opacity:0.4}
.day-tile-day{font-family:'DM Mono',monospace;font-size:8px;color:var(--faint);letter-spacing:0.5px}
.day-tile.is-today .day-tile-day{color:var(--accent)}
.day-tile-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);line-height:1.1}
.day-tile.is-today .day-tile-num{color:var(--accent)}
.day-tile-dot{width:5px;height:5px;border-radius:50%;background:transparent;margin:4px auto 0}
.day-tile-check{font-size:8px;color:var(--run-text);margin-top:2px;height:12px}
.day-tile-km{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-top:1px}
.section-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.upcoming-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.12s,background 0.12s}
.upcoming-row:hover,.upcoming-row.is-today{border-color:rgba(212,245,66,0.28);background:rgba(212,245,66,0.03)}
.upcoming-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);flex-shrink:0;text-align:center;width:28px}
.upcoming-date.is-today{color:var(--accent)}
.upcoming-date-day{font-size:8px;text-transform:uppercase}
.upcoming-date-num{font-size:16px;font-weight:500;line-height:1.1}
.upcoming-body{flex:1;min-width:0}
.upcoming-title{font-size:13px;font-weight:600}
.upcoming-metric{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);margin-top:2px}
.upcoming-emoji{font-size:20px;flex-shrink:0}

/* TRAINING */
.phase-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.phase-tab{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:color 0.12s,border-color 0.12s,background 0.12s}
.phase-tab:hover{color:var(--accent);border-color:var(--accent)}
.phase-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.plan-table{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.plan-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.1s;position:relative}
.plan-row:hover{background:rgba(255,255,255,0.02)}
.plan-row:last-child{border-bottom:none}
.plan-row.is-today{background:rgba(212,245,66,0.04)}
.plan-row.is-past .plan-row-date,.plan-row.is-past .plan-row-title,.plan-row.is-past .plan-row-km{opacity:0.4}
.plan-row.is-work{background:rgba(255,193,7,0.025)}
.plan-row-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);flex-shrink:0;width:36px;line-height:1.4}
.plan-row-date strong{display:block;color:var(--muted);font-size:10px}
.plan-row.is-today .plan-row-date strong{color:var(--accent)}
.plan-row-emoji{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.plan-row-body{flex:1;min-width:0}
.plan-row-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-row-km{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);flex-shrink:0}
.plan-row-feedback{width:6px;height:6px;border-radius:50%;background:var(--run-text);flex-shrink:0;opacity:0.7}
.plan-row-detail{display:none;padding:0 14px 12px 14px;font-size:11px;color:var(--muted);line-height:1.5;border-top:1px solid rgba(255,255,255,0.04)}
.plan-row-detail.open{display:block}
.plan-feedback-text{font-family:'DM Mono',monospace;font-size:9px;background:rgba(76,175,80,0.1);color:var(--run-text);padding:2px 6px;border-radius:2px;margin-top:6px;display:inline-block}
.plan-edit-field{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:7px 10px;outline:none;margin-top:4px;transition:border-color 0.15s}
.plan-edit-field:focus{border-color:var(--accent)}
.plan-loading{text-align:center;padding:40px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px}
.plan-loading::after{content:'';display:block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:16px auto 0;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-week-row{padding:10px 14px;color:var(--faint);font-size:12px;font-style:italic;border-bottom:1px solid rgba(255,255,255,0.04)}
.empty-week-row:last-child{border-bottom:none}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px}
.cal-nav-btn{background:none;border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color 0.12s,color 0.12s;flex-shrink:0}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-month-label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.cal-add-race-btn{background:var(--accent);color:#000;border:none;border-radius:6px;padding:7px 12px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.12s}
.cal-add-race-btn:hover{background:#c8ec30}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-dow{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);text-align:center;padding:6px 0;letter-spacing:0.5px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;position:relative;font-size:13px;transition:background 0.1s,color 0.1s;color:var(--text)}
.cal-cell:hover{background:rgba(255,255,255,0.06)}
.cal-cell.other-month{opacity:0.2;cursor:default}
.cal-cell.other-month:hover{background:transparent}
.cal-cell.is-today{background:rgba(212,245,66,0.14);font-weight:600;color:var(--accent)}
.cal-cell.selected{background:rgba(212,245,66,0.22);color:var(--accent)}
.cal-cell.has-race::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--race-text);position:absolute;bottom:2px}
.cal-cell.has-race.main-goal::after{background:var(--accent)}
.cal-race-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.12s}
.cal-race-row:hover{border-color:rgba(212,245,66,0.28)}
.cal-race-main{border-left:2px solid var(--accent)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:var(--accent)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.feedback-history{display:flex;flex-direction:column;gap:6px}
.fh-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 14px;display:flex;gap:12px;align-items:flex-start}
.fh-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);flex-shrink:0;width:36px}
.fh-body{flex:1}
.fh-title{font-size:12px;font-weight:600;margin-bottom:2px}
.fh-text{font-size:11px;color:var(--muted);line-height:1.45}
.fh-km{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);flex-shrink:0}

/* SETTINGS */
.settings-group{margin-bottom:20px}
.settings-group-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:8px;padding-left:2px}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:8px}
.settings-divider{height:1px;background:var(--border);margin:12px 0}
.settings-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.settings-field{margin-bottom:12px}
.settings-field:last-child{margin-bottom:0}
.settings-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block}
.settings-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:9px 12px;outline:none;transition:border-color 0.15s}
.settings-input:focus{border-color:var(--accent)}
.settings-hint{font-size:11px;color:var(--faint);margin-top:4px;line-height:1.45}
.btn-save{background:var(--accent);color:#000;border:none;border-radius:6px;padding:10px 20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;font-weight:700;cursor:pointer;transition:background 0.12s}
.btn-save:hover{background:#c8ec30}
.connection-status{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:10px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--faint)}
.status-dot.ok{background:var(--run-text)}
.status-dot.err{background:var(--race-text)}
.pr-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pr-dist-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:72px;flex-shrink:0}
.lang-toggle-row{display:flex;gap:8px}
.lang-btn{flex:1;padding:9px 12px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;border-radius:6px;cursor:pointer;transition:all 0.12s;text-align:center}
.lang-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(212,245,66,0.06)}
/* Login UI */
.account-row{display:flex;align-items:center;gap:10px}
.account-avatar{width:36px;height:36px;border-radius:50%;background:rgba(212,245,66,0.15);border:1px solid rgba(212,245,66,0.3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.account-info{flex:1;min-width:0}
.account-email{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.account-status{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);margin-top:1px}
.account-logout{background:none;border:1px solid var(--border);border-radius:4px;padding:5px 10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;flex-shrink:0;transition:border-color 0.12s,color 0.12s}
.account-logout:hover{border-color:var(--race-text);color:var(--race-text)}
.login-form{display:flex;flex-direction:column;gap:8px}
.telegram-status{display:flex;align-items:center;gap:6px;margin-top:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.tg-dot{width:6px;height:6px;border-radius:50%;background:var(--faint);flex-shrink:0}
.tg-dot.linked{background:var(--run-text)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(13,13,13,0.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--sb);z-index:100}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 8px;cursor:pointer;background:none;border:none;color:var(--faint);transition:color 0.15s}
.bn-item:hover{color:var(--muted)}
.bn-item.active{color:var(--accent)}
.bn-icon{font-size:20px;line-height:1}
.bn-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.5px;text-transform:uppercase}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;color:var(--text);margin-bottom:6px}
.loading-logo span{color:var(--accent)}
.loading-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin-bottom:28px}
.loading-bar{width:120px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--accent);border-radius:1px;animation:loadbar 1.8s ease-in-out infinite}
@keyframes loadbar{0%{width:0;transform:translateX(0)}50%{width:80px}100%{width:0;transform:translateX(120px)}}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:88dvh;overflow-y:auto;padding:20px 18px calc(var(--sb) + 20px);transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.34,1.12,0.64,1)}
.modal-backdrop.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.5px;margin-bottom:14px}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}

/* ONBOARDING - dimmed overlay, licht wegklikbaar */
.onboarding-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease}
.onboarding-sheet{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;padding:20px 20px calc(var(--sb) + 20px);animation:slideUp 0.28s cubic-bezier(0.34,1.12,0.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ob-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.ob-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px}
.ob-logo span{color:var(--accent)}
.ob-skip{background:none;border:none;color:var(--faint);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.5px;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0;transition:color 0.12s}
.ob-skip:hover{color:var(--muted)}
.ob-title{font-size:17px;font-weight:600;margin-bottom:16px;line-height:1.3}
.ob-step{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--sb) + 72px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#000;font-family:'DM Mono',monospace;font-size:11px;padding:10px 18px;border-radius:20px;opacity:0;transition:opacity 0.22s,transform 0.22s;pointer-events:none;z-index:400;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.no-data{text-align:center;padding:32px;color:var(--faint);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.5px}

/* C26: connection management */
.connect-btn{width:100%;padding:12px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.5px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:border-color 0.15s,color 0.15s}
.connect-btn.connected{border-color:var(--run-text);background:rgba(76,175,80,0.06);color:var(--text)}
.connect-btn.connected .cb-dot{background:var(--run-text)}
.cb-dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0}
.cb-label{flex:1;min-width:0}
.cb-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb-status{font-size:9px;color:var(--muted);letter-spacing:0.5px;margin-top:1px}
.connect-form{margin-top:10px}
.disconnect-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--faint);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;margin-top:8px;transition:border-color 0.12s,color 0.12s}
.disconnect-btn:hover{border-color:var(--race-text);color:var(--race-text)}
/* C27: swipe training — touch-driven week browse */
.plan-swipe-wrapper{position:relative;overflow:hidden;touch-action:pan-y}
.plan-swipe-inner{transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);will-change:transform}
/* C29: floating fase label */
.fase-float{position:sticky;top:0;z-index:5;padding:6px 14px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);background:rgba(13,13,13,0.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(212,245,66,0.12);opacity:0.9}
.fase-next-nudge{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;color:var(--faint);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;border-top:1px solid var(--border);cursor:pointer;transition:color 0.15s}
.fase-next-nudge:hover{color:var(--accent)}
.fase-next-nudge svg{transition:transform 0.15s}
.fase-next-nudge:hover svg{transform:translateX(3px)}
@media(min-width:480px){.bottom-nav{left:0;right:0;transform:none}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">RUNNING<span>X</span></div>
  <div class="loading-sub" id="loadingSub">Laden…</div>

</div>
<div class="toast" id="toast"></div>

<!-- DAY MODAL -->

  </div>
</div>

<!-- RACE MODAL -->

    <div id="raceModalContent"></div>
  </div>
</div>

<!-- ONBOARDING — dimmed, tik buiten sheet om te sluiten -->
<div class="onboarding-overlay" id="onboarding" style="display:none" onclick="onboardingOverlayClick(event)">
  <div class="onboarding-sheet" id="onboardingSheet">
    <div class="ob-header">
      <div class="ob-logo">RUNNING<span>X</span></div>
      <button class="ob-skip" onclick="onboardingFinish()">Overslaan</button>
    </div>
    <div id="onboardingStep1">
      <div class="ob-step">Stap 1 van 2</div>
      <div class="ob-title">Welkom bij RunningX 👋<br>Wat is je doel?</div>

        <label class="settings-label" data-i18n="goal_race"></label>
        <input type="text" class="settings-input" id="obRace" placeholder="Bijv. Big10 Rotterdam">
      </div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="goal_date"></label>
        <input type="date" class="settings-input" id="obDate">
      </div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="goal_dist"></label>

          <option value="">—</option>
          <option value="5km">5 km</option><option value="10km" selected>10 km</option>
          <option value="10mile">10 mile</option><option value="HM" data-i18n-opt="hm"></option>
          <option value="M" data-i18n-opt="marathon"></option><option value="other" data-i18n-opt="other_dist"></option>
        </select>
      </div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="goal_time"></label>
        <input type="text" class="settings-input" id="obTime" placeholder="37:30">
      </div>
      <button class="btn-primary" onclick="onboardingNext()">Volgende →</button>

      <div class="ob-title" data-i18n="pr_title"></div>

        <label class="settings-label" data-i18n="pr_add"></label>
        <select class="settings-input" id="obPrDist" onchange="addObPrField()">
          <option value="">—</option>
          <option value="5km">5 km</option><option value="10km">10 km</option>
          <option value="10mile">10 mile</option><option value="HM" data-i18n-opt="hm"></option>

      </div>
      <div id="obPrFields"></div>
      <button class="btn-primary" onclick="onboardingFinish()" style="margin-top:8px">Aan de slag 🏃</button>
      <button class="btn-secondary" onclick="onboardingFinish()">Overslaan</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <div style="flex-shrink:0">
      <div class="topbar-logo"><span class="logo-running">RUNNING</span><span class="logo-x">X</span></div>
      <div class="topbar-sub" id="topbarName"></div>
    </div>
    <div class="topbar-races" id="topbarRaces"></div>
    <button class="topbar-gear" onclick="switchTab('settings')" title="Instellingen">⚙</button>
  </div>
  <!-- Update banner (hidden by default) -->
  <div class="update-banner" id="updateBanner" style="display:none" onclick="applyUpdate()">

      <div id="planContent"></div>

        <div class="settings-section">
          <div class="settings-title" data-i18n="pr_title"></div>
          <div class="settings-field">
            <label class="settings-label" data-i18n="pr_add"></label>
            <select class="settings-input" id="prDistSelect" onchange="addPrField()">

// ── STATE ────────────────────────────────────────────────────────────────────
const state={
  scriptUrl: localStorage.getItem('scriptUrl')||'',
  sheetName: localStorage.getItem('sheetName')||'',
  lang:      localStorage.getItem('lang')||'nl',
  data:      null,
  currentTab:'today',
  selectedRating:0,
  editingFeedback:false,
  calYear:   new Date().getFullYear(),
  calMonth:  new Date().getMonth(),
  calSelectedDate:null,
  editingRaceId:null,
  _prs:null,_races:null,
  swReg:null,
  pendingSW:null,
  planWeekOffset:0,     // C27: week swipe offset (0 = current week)
  currentFase:null,     // C29: active fase for floating label
};

// ── HELPERS ──────────────────────────────────────────────────────────────────
const T=k=>STRINGS[state.lang]?.[k]??STRINGS.nl[k]??k;
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const todayStr=()=>new Date().toISOString().split('T')[0];
const parseDate=s=>new Date(s+'T00:00:00');
const daysUntil=s=>{const n=new Date();n.setHours(0,0,0,0);return Math.round((parseDate(s)-n)/86400000);};

function fmtDate(s){
  const d=parseDate(s),days=state.lang==='en'?DAYS_EN:DAYS_NL,months=state.lang==='en'?MONTHS_EN:MONTHS_NL;
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}
function fmtDateFull(s){
  const d=parseDate(s),days=state.lang==='en'?DAYS_EN:DAYS_NL,mf=state.lang==='en'?MONTHS_FULL_EN:MONTHS_FULL_NL;
  return `${days[d.getDay()]} ${d.getDate()} ${mf[d.getMonth()]} ${d.getFullYear()}`;
}
function getMondayStr(){
  const n=new Date();n.setHours(0,0,0,0);
  const dow=n.getDay();n.setDate(n.getDate()-(dow===0?6:dow-1));
  return n.toISOString().split('T')[0];
}
function getWeekDates(){
  const m=parseDate(getMondayStr());
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d.toISOString().split('T')[0];});
}

// C24: type resolution — comma-separated, first valid type wins for colour
function typeOf(typeStr){
  if(!typeStr)return TYPE_FALLBACK;
  const parts=typeStr.toLowerCase().split(',').map(s=>s.trim());
  for(const p of parts){
    if(TYPES[p])return TYPES[p];
  }
  return TYPE_FALLBACK;
}
// C24: check for specific type in comma-separated string
const hasType=(typeStr,key)=>typeStr?.toLowerCase().split(',').map(s=>s.trim()).includes(key)??false;
const isWork=t=>hasType(t,'werk');
const isRace=t=>hasType(t,'race');
const isRust=t=>hasType(t,'rust');
const isMob=t=>hasType(t,'mobiliteit');

function countdownDisplay(days){
  if(days<0)return{val:'✓',unit:T('days_ago')};
  if(days===0)return{val:'!',unit:T('days_today')};
  if(days<=30)return{val:days,unit:T('days_label')};
  if(days<=90)return{val:Math.round(days/7),unit:T('weeks_label')};
  return{val:Math.round(days/30),unit:T('months_label')};
}

// C25: race emoji - language-agnostic
function raceEmoji(race){
  const d=(race.dist||'').toLowerCase(),tp=(race.raceType||'').toLowerCase();
  if(tp.includes('trail')||tp.includes('ultra'))return'🏔';
  if(tp.includes('baan')||tp.includes('track'))return'🏟';
  if(d.includes('marathon')&&!d.includes('half')&&!d.includes('halve'))return'🏅';
  if(d.includes('halve')||d.includes('half')||d==='hm')return'🥈';
  if(d==='5km'||d==='5 km')return'⚡';
  if(d==='10km'||d==='10 km')return'🎯';
  return'🏁';
}

// ── LOCALSTORAGE ─────────────────────────────────────────────────────────────
function loadPRs(){if(!state._prs){try{state._prs=JSON.parse(localStorage.getItem('prs')||'{}')}catch{state._prs={}}}return state._prs;}
function loadRaces(){if(!state._races){try{state._races=JSON.parse(localStorage.getItem('userRaces')||'[]')}catch{state._races=[]}}return state._races;}
function persistPRs(p){state._prs=p;localStorage.setItem('prs',JSON.stringify(p));}
function persistRaces(r){state._races=r;localStorage.setItem('userRaces',JSON.stringify(r));}

// ── SERVICE WORKER ───────────────────────────────────────────────────────────
function initServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    state.swReg=reg;
    // Check for waiting SW immediately
    if(reg.waiting)onSWWaiting(reg.waiting);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller)
          onSWWaiting(nw);
      });
    });
  }).catch(()=>{});
  // Listen for message from SW that it has claimed clients after skipWaiting
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    window.location.reload();
  });
}

function onSWWaiting(sw){
  state.pendingSW=sw;
  const banner=document.getElementById('updateBanner');
  if(banner){
    document.getElementById('updateBannerText').textContent=T('update_available');
    banner.querySelector('button').textContent=T('update_apply');
    banner.style.display='flex';
  }
}

function applyUpdate(){
  if(state.pendingSW){
    state.pendingSW.postMessage({type:'SKIP_WAITING'});
  }
}

// ── DATA ─────────────────────────────────────────────────────────────────────
function buildApiUrl(action){
  const base=state.scriptUrl+'?action='+action;
  return state.sheetName?base+'&sheetName='+encodeURIComponent(state.sheetName):base;
}

async function fetchData(){
  if(!state.scriptUrl){hideLoading();renderActiveView();renderHeader();return;}
  try{
    const res=await fetch(buildApiUrl('getAll'));
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json.status!=='ok')throw new Error(json.message||'Error');
    state.data=json.rows;
    updateConnectionStatus(true);
  }catch(e){updateConnectionStatus(false,e.message);}
  hideLoading();renderActiveView();renderHeader();
}

async function submitFeedback(datum,rating,tekst){
  if(!state.scriptUrl){showToast('❌ '+T('enter_url'));return false;}
  try{
    const params=new URLSearchParams({action:'setFeedback',datum,rating,tekst:tekst||''});
    if(state.sheetName)params.set('sheetName',state.sheetName);
    const json=await(await fetch(state.scriptUrl+'?'+params)).json();
    if(json.status!=='ok')throw new Error(json.message);
    if(state.data){
      const row=state.data.find(r=>r.datum===datum);
      if(row){const e=['😵','😓','😐','💪','🔥'];row.feedback=`${rating}/5 ${e[rating-1]}${tekst?' – '+tekst:''}`;}
    }
    showToast('✓ '+T('feedback_logged'));return true;
  }catch(e){showToast('❌ '+e.message);return false;}
}

// ── RENDER DISPATCH ───────────────────────────────────────────────────────────
function renderActiveView(){
  switch(state.currentTab){
    case 'today':    renderToday();break;
    case 'week':     renderWeek();break;
    case 'plan':     renderPlan();break;
    case 'calendar': renderCalendar();break;
    case 'stats':    renderStats();break;
    case 'settings': renderSettingsFields();break;
  }
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function renderHeader(){
  const races=loadRaces();
  const name=localStorage.getItem('userName')||'';
  document.getElementById('topbarName').textContent=name;
  const container=document.getElementById('topbarRaces');
  const visible=races.filter(r=>daysUntil(r.date)>=-1).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  let h='';
  visible.forEach(r=>{
    const d=daysUntil(r.date),cd=countdownDisplay(d);
    h+=`<div class="race-chip${r.mainGoal?' main-chip':''}" onclick="switchTab('calendar')">
      <div class="rc-name">${raceEmoji(r)} ${esc(r.name)}</div>
      <div class="rc-cd">${cd.val}</div>
      <div class="rc-label">${cd.unit}</div>
    </div>`;
  });
  h+=`<div class="race-chip-add${!visible.length?' ':''}" onclick="openRaceModal()" title="${T('race_add')}">+</div>`;
  container.innerHTML=h;
}

// ── TODAY ─────────────────────────────────────────────────────────────────────
function renderToday(){
  const el=document.getElementById('todayContent');
  const t=todayStr();
  const days=state.lang==='en'?DAYS_EN:DAYS_NL;
  const mf=state.lang==='en'?MONTHS_FULL_EN:MONTHS_FULL_NL;
  const d=parseDate(t);

  let faseLine='';
  if(state.data){const tr=state.data.find(r=>r.datum===t);if(tr?.fase)faseLine=`<div class="today-phase-line">${esc(tr.fase)}</div>`;}

  let h=`<div class="today-header">
    <div class="today-date-big">${days[d.getDay()]} ${d.getDate()} ${mf[d.getMonth()]}</div>
    ${faseLine}
  </div>`;

  if(!state.data){
    h+=noSchemaHint();
    h+=`<div class="mob-reminder"><div class="mob-title">${T('mob_reminder')}</div><div class="mob-text">${T('mob_text')}</div></div>`;
    el.innerHTML=h;return;
  }

  const row=state.data.find(r=>r.datum===t);
  // C24: show rest card only if type is exactly 'rust' or no row
  if(!row||isRust(row.type)){
    h+=`<div class="card">
      <div class="rest-card-inner">
        <div class="rest-emoji">😴</div>
        <div><div class="rest-title">${T('rest_day')}</div><div class="rest-sub">${T('rest_msg')}</div></div>
      </div>
    </div>`;
  }else{
    const ti=typeOf(row.type);
    const border=isWork(row.type)?'work-border':isRace(row.type)?'race-border':'';
    h+=`<div class="card ${border}">
      <div class="tc-top">
        <div class="tc-emoji">${row.emoji||'🏃'}</div>
        <div class="tc-main">
          <div class="tc-type" style="color:${ti.text}">${T(ti.i18n)}</div>
          <div class="tc-title">${esc(row.titel||'Training')}</div>
          ${row.km?`<div class="tc-metric">${esc(row.km)} km</div>`:''}
        </div>
      </div>
      ${row.detail?`<div class="tc-detail">${esc(row.detail)}</div>`:''}
    </div>`;
    if(!isWork(row.type))h+=feedbackHtml(row.datum,row.feedback);
  }

  // Tomorrow
  const tmrDate=new Date();tmrDate.setDate(tmrDate.getDate()+1);
  const tmr=state.data.find(r=>r.datum===tmrDate.toISOString().split('T')[0]);
  if(tmr){
    h+=`<div class="card"><div class="tmr-card">
      <div class="tmr-label">${T('tomorrow')} →</div>
      <div class="tmr-row">
        <div class="tmr-title">${tmr.emoji||''} ${esc(tmr.titel||'')}</div>
        ${tmr.km?`<div class="tmr-metric">${esc(tmr.km)} km</div>`:''}
      </div>
    </div></div>`;
  }

  // C24: mob reminder only when type includes 'mobiliteit'
  if(!row||isMob(row?.type)){
    h+=`<div class="mob-reminder"><div class="mob-title">${T('mob_reminder')}</div><div class="mob-text">${T('mob_text')}</div></div>`;
  }

  el.innerHTML=h;
  attachStarListeners();
}

function noSchemaHint(){
  return `<div class="no-connection-hint" onclick="switchTab('settings')">
    <div class="nch-icon">📋</div>
    <div><div class="nch-text">${T('setup_title')}</div><div class="nch-link">${T('setup_body')}</div></div>
  </div>`;
}

// ── FEEDBACK ──────────────────────────────────────────────────────────────────
function feedbackHtml(datum,existing){
  const isEdit=!!existing;let rating=0,text='';
  if(isEdit){const m=existing.match(/^(\d)/);if(m)rating=parseInt(m[1]);const mt=existing.match(/–\s*(.+)$/);if(mt)text=mt[1];}
  if(isEdit&&!state.editingFeedback){
    return `<div class="prev-feedback">
      <div class="prev-feedback-header">
        <span class="prev-feedback-label">${T('feedback_logged')}</span>
        <button class="edit-link" onclick="state.editingFeedback=true;renderToday()">${T('feedback_edit')}</button>
      </div>
      <div class="prev-feedback-text">${esc(existing)}</div>
    </div>`;
  }
  const stars=['😵','😓','😐','💪','🔥'].map((e,i)=>
    `<button class="star-btn${rating>0&&(i+1)<=rating?' active':''}" data-val="${i+1}">${e}</button>`
  ).join('');
  return `<div class="feedback-section">
    <div class="feedback-title">${T('feedback_q')}</div>
    <div class="feedback-stars">${stars}</div>
    <textarea class="feedback-textarea" id="feedbackText">${esc(text)}</textarea>
    <button class="btn-primary" id="submitBtn" onclick="handleFeedbackSubmit('${esc(datum)}')">${isEdit?T('feedback_update'):T('feedback_save')}</button>
    ${isEdit?`<button class="btn-secondary" onclick="state.editingFeedback=false;renderToday()">${T('feedback_cancel')}</button>`:''}
  </div>`;
}

function attachStarListeners(scope){
  const sel=scope?`#${scope} .star-btn`:'.star-btn';
  document.querySelectorAll(sel).forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.selectedRating=parseInt(btn.dataset.val);
      document.querySelectorAll(sel).forEach(b=>b.classList.toggle('active',parseInt(b.dataset.val)<=state.selectedRating));
    });
  });
}

async function handleFeedbackSubmit(datum){
  if(!state.selectedRating){showToast(T('select_score'));return;}
  const btn=document.getElementById('submitBtn');
  const tekst=document.getElementById('feedbackText')?.value||'';
  btn.disabled=true;btn.textContent='…';
  const ok=await submitFeedback(datum,state.selectedRating,tekst);
  if(ok){state.editingFeedback=false;state.selectedRating=0;setTimeout(renderToday,800);}
  else{btn.disabled=false;btn.textContent=T('feedback_save');}
}

// ── WEEK ──────────────────────────────────────────────────────────────────────
function renderWeek(){
  const el=document.getElementById('weekContent');
  const t=todayStr(),dates=getWeekDates();
  const days=state.lang==='en'?DAYS_EN:DAYS_NL;
  const wd=dates.map(d=>({date:d,row:state.data?.find(r=>r.datum===d)??null}));

  const plannedKm=wd.reduce((s,{row})=>s+(parseFloat(row?.km)||0),0);
  const doneKm=wd.filter(({date})=>date<=t).reduce((s,{row})=>s+(parseFloat(row?.km)||0),0);
  // C24: count by standardised types
  const trainDays=wd.filter(({row})=>row&&hasType(row.type,'run')).length;
  const workDays=wd.filter(({row})=>row&&isWork(row.type)).length;
  const fbDone=wd.filter(({row})=>row?.feedback).length;
  const pct=plannedKm>0?Math.min(100,Math.round(doneKm/plannedKm*100)):0;

  let h=`<div class="week-stat-grid">
    <div class="week-stat"><div class="week-stat-val" style="color:var(--run-text)">${plannedKm.toFixed(0)}</div><div class="week-stat-lbl">${T('week_km')}</div></div>
    <div class="week-stat"><div class="week-stat-val">${trainDays}</div><div class="week-stat-lbl">${T('week_sessions')}</div></div>
    <div class="week-stat"><div class="week-stat-val" style="color:var(--work-text)">${workDays}</div><div class="week-stat-lbl">${T('week_werk')}</div></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-header"><span class="progress-bar-label">${T('week_progress')}</span><span class="progress-bar-val">${doneKm.toFixed(1)} / ${plannedKm.toFixed(0)} km</span></div>
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-bar-footer"><span>${pct}% ${T('week_done')}</span><span style="color:${fbDone?'var(--run-text)':'var(--faint)'}">✓ ${fbDone} ${T('week_feedback')}</span></div>
  </div>
  <div class="day-tiles">`;

  wd.forEach(({date,row})=>{
    const isPast=date<t,isTdy=date===t,d=parseDate(date);
    const ti=row?typeOf(row.type):null;
    const dot=ti?ti.text:'transparent';
    h+=`<div class="day-tile${isTdy?' is-today':''}${isPast&&!isTdy?' is-past':''}">
      <div class="day-tile-day">${days[d.getDay()]}</div>
      <div class="day-tile-num">${d.getDate()}</div>
      <div class="day-tile-dot" style="background:${dot}"></div>
      <div class="day-tile-check">${row?.feedback?'✓':''}</div>
      ${row?.km?`<div class="day-tile-km">${parseFloat(row.km).toFixed(0)}k</div>`:''}
    </div>`;
  });
  h+='</div>';

  // Upcoming or empty
  if(!state.data){h+=noSchemaHint();}
  else{
    const upcoming=wd.filter(({date,row})=>date>=t&&row&&row.type!=='');
    if(upcoming.length){
      h+=`<div class="section-label">${T('week_todo')}</div>`;
      upcoming.forEach(({date,row})=>{
        const isTdy=date===t,ti=typeOf(row.type),d=parseDate(date);
        h+=`<div class="upcoming-row${isTdy?' is-today':''}" onclick="openDayModal('${date}')">
          <div class="upcoming-date${isTdy?' is-today':''}">
            <div class="upcoming-date-day">${days[d.getDay()]}</div>
            <div class="upcoming-date-num">${d.getDate()}</div>
          </div>
          <div class="upcoming-body">
            <span class="badge" style="background:${ti.bg};color:${ti.text};margin-bottom:3px">${T(ti.i18n)}</span>
            <div class="upcoming-title">${esc(row.titel||'')}</div>
            ${row.km?`<div class="upcoming-metric">${esc(row.km)} km</div>`:''}
          </div>
          <div class="upcoming-emoji">${row.emoji||''}</div>

// ── PLAN ──────────────────────────────────────────────────────────────────────
function renderPlan(){
  const el=document.getElementById('planContent');
  const t=todayStr();

  if(!state.data){
    // C22: show current week even without schema
    renderPlanWithoutData(t);
    return;
  }

  const allRows=state.data.filter(r=>r.datum);
  if(!allRows.length){el.innerHTML=`<div class="no-data">${T('no_data')}</div>`;buildPhaseTabs([]);return;}

  const faseValues=[...new Set(allRows.map(r=>r.fase||'').filter(Boolean))];
  const phaseTabs=document.getElementById('phaseTabs');

  if(faseValues.length>0){
    const activeFase=phaseTabs.querySelector('.phase-tab.active')?.dataset.fase||faseValues[0];
    phaseTabs.innerHTML=faseValues.map((f,i)=>
      `<button class="phase-tab${f===activeFase?' active':''}" data-fase="${esc(f)}" onclick="selectFase(this,'${esc(f)}')">${esc(f)}</button>`
    ).join('');
    renderPlanRows(allRows.filter(r=>r.fase===activeFase),t);
  }else{
    phaseTabs.innerHTML='';
    renderPlanRows(allRows,t);
  }
}

function buildPhaseTabs(values){
  document.getElementById('phaseTabs').innerHTML=values.map((f,i)=>
    `<button class="phase-tab${i===0?' active':''}" data-fase="${esc(f)}">${esc(f)}</button>`
  ).join('');
}

function renderPlanWithoutData(t){

  document.getElementById('phaseTabs').innerHTML='';

  dates.forEach(date=>{
    const isPast=date<t,isTdy=date===t,d=parseDate(date);
    const rowId='pr-empty-'+date;

      <div class="plan-row${isTdy?' is-today':''}${isPast?' is-past':''}" onclick="openDayModal('${date}')">
        <div class="plan-row-date"><strong>${days[d.getDay()]} ${d.getDate()}</strong>${MONTHS_NL[d.getMonth()]}</div>

function selectFase(btn,fase){
  document.querySelectorAll('#phaseTabs .phase-tab').forEach(b=>b.classList.toggle('active',b===btn));
  renderPlanRows((state.data||[]).filter(r=>(r.fase||'')===(fase||'')),todayStr());
}

function renderPlanRows(rows,t){
  const el=document.getElementById('planContent');
  if(!rows.length){el.innerHTML=`<div class="no-data">${T('no_data')}</div>`;return;}

  let h='';
  let lastFase=null;

  // C29: wrap in swipe container
  h+='<div class="plan-swipe-wrapper" id="planSwipeWrapper"><div class="plan-swipe-inner" id="planSwipeInner">';
  h+='<div class="plan-table">';

  rows.forEach(row=>{
    const isPast=row.datum<t,isTdy=row.datum===t,work=isWork(row.type),ti=typeOf(row.type);
    const parts=fmtDate(row.datum).split(' ');
    const rowId='pr-'+row.datum;

    // C29: insert floating fase label when fase changes
    if(row.fase&&row.fase!==lastFase){
      h+=`</div><div class="fase-float">${esc(row.fase)}</div><div class="plan-table" style="border-top:none;border-radius:0 0 6px 6px">`;
      lastFase=row.fase;
    }else if(!lastFase&&!row.fase){
      // no fase at all, normal rendering
    }

    h+=`<div>
      <div class="plan-row${isPast?' is-past':''}${isTdy?' is-today':''}${work?' is-work':''}" onclick="togglePlanRow('${rowId}','${row.datum}')">
        <div class="plan-row-date"><strong>${parts[0]} ${parts[1]}</strong>${parts[2]}</div>
        <div class="plan-row-emoji">${row.emoji||'·'}</div>
        <div class="plan-row-body"><div class="plan-row-title">${esc(row.titel||'—')}</div></div>
        ${row.km?`<div class="plan-row-km">${esc(row.km)}km</div>`:'<div class="plan-row-km"></div>'}
        ${row.feedback?'<div class="plan-row-feedback"></div>':''}
      </div>
      <div class="plan-row-detail" id="${rowId}">
        <span class="badge" style="background:${ti.bg};color:${ti.text};margin-bottom:6px">${T(ti.i18n)}</span>
        ${row.detail?`<div style="margin-top:4px;color:var(--muted)">${esc(row.detail)}</div>`:''}
        ${row.feedback?`<div class="plan-feedback-text">✓ ${esc(row.feedback)}</div>`:''}
        <button style="margin-top:8px;background:none;border:1px solid var(--border);border-radius:4px;padding:5px 10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer" onclick="openDayModal('${row.datum}');event.stopPropagation()">📝</button>
      </div>
    </div>`;
  });

  h+='</div>';

  // C29: next-fase nudge at bottom
  const faseValues=state.data?[...new Set(state.data.map(r=>r.fase||'').filter(Boolean))]:[];
  const activeFase=document.getElementById('phaseTabs')?.querySelector('.phase-tab.active')?.dataset.fase;
  if(activeFase&&faseValues.length>1){
    const idx=faseValues.indexOf(activeFase);
    if(idx<faseValues.length-1){
      const nextFase=faseValues[idx+1];
      h+=`<div class="fase-next-nudge" onclick="selectFaseByName('${esc(nextFase)}')">
        ${esc(T('next_fase'))}: ${esc(nextFase)}
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>`;
    }
  }

  h+='</div></div>'; // close swipe-inner + swipe-wrapper
  el.innerHTML=h;
  requestAnimationFrame(()=>{
    el.querySelector('.is-today')?.scrollIntoView({behavior:'smooth',block:'center'});
    initPlanSwipe();
  });
}

function togglePlanRow(id){
  const detail=document.getElementById(id);if(!detail)return;
  const isOpen=detail.classList.contains('open');
  document.querySelectorAll('.plan-row-detail.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen)detail.classList.add('open');
}

// C29: navigate to fase by name
function selectFaseByName(fase){
  const btn=document.querySelector(`#phaseTabs .phase-tab[data-fase="${CSS.escape(fase)}"]`);
  if(btn)selectFase(btn,fase);
}

// C27: swipe gesture for Training tab
function initPlanSwipe(){
  const wrapper=document.getElementById('planSwipeWrapper');
  if(!wrapper)return;
  let startX=0,startY=0,dragging=false;
  wrapper.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;
  },{passive:true});
  wrapper.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      swipePlanFase(dx<0?1:-1);
    }
  },{passive:true});
}

function swipePlanFase(dir){
  if(!state.data)return;
  const faseValues=[...new Set(state.data.map(r=>r.fase||'').filter(Boolean))];
  if(faseValues.length<=1)return;
  const phaseTabs=document.getElementById('phaseTabs');
  const active=phaseTabs?.querySelector('.phase-tab.active');
  if(!active)return;
  const idx=faseValues.indexOf(active.dataset.fase);
  const next=faseValues[idx+dir];
  if(next===undefined)return;
  const btn=phaseTabs.querySelector(`[data-fase="${CSS.escape(next)}"]`);
  if(btn)selectFase(btn,next);
}

function feedbackHtmlModal(datum,existing){
  const isEdit=!!existing;let rating=0,text='';
  if(isEdit){const m=existing.match(/^(\d)/);if(m)rating=parseInt(m[1]);const mt=existing.match(/–\s*(.+)$/);if(mt)text=mt[1];}
  if(isEdit&&!state.editingFeedback){
    return `<div class="prev-feedback">
      <div class="prev-feedback-header">
        <span class="prev-feedback-label">${T('feedback_logged')}</span>
        <button class="edit-link" onclick="state.editingFeedback=true;openDayModal('${datum}')">${T('feedback_edit')}</button>
      </div>
      <div class="prev-feedback-text">${esc(existing)}</div>
    </div>`;
  }
  const stars=['😵','😓','😐','💪','🔥'].map((e,i)=>
    `<button class="star-btn${rating>0&&(i+1)<=rating?' active':''}" data-val="${i+1}">${e}</button>`
  ).join('');
  return `<div class="feedback-section">
    <div class="feedback-title">${T('feedback_q')}</div>
    <div class="feedback-stars">${stars}</div>
    <textarea class="feedback-textarea" id="modalFbText">${esc(text)}</textarea>
    <button class="btn-primary" id="modalSubmitBtn" onclick="handleModalFeedback('${esc(datum)}')">${isEdit?T('feedback_update'):T('feedback_save')}</button>
    ${isEdit?`<button class="btn-secondary" onclick="state.editingFeedback=false;openDayModal('${datum}')">${T('feedback_cancel')}</button>`:''}
  </div>`;
}

async function handleModalFeedback(datum){
  if(!state.selectedRating){showToast(T('select_score'));return;}
  const btn=document.getElementById('modalSubmitBtn');
  const tekst=document.getElementById('modalFbText')?.value||'';
  btn.disabled=true;btn.textContent='…';
  const ok=await submitFeedback(datum,state.selectedRating,tekst);
  if(ok){state.editingFeedback=false;state.selectedRating=0;closeDayModal();renderActiveView();}
  else{btn.disabled=false;btn.textContent=T('feedback_save');}
}

async function saveModalNote(datum){
  const tekst=document.getElementById('modalNoteText')?.value||'';
  if(!state.scriptUrl){showToast('❌ '+T('enter_url'));return;}
  try{
    const params=new URLSearchParams({action:'setFeedback',datum,rating:0,tekst});
    if(state.sheetName)params.set('sheetName',state.sheetName);
    const json=await(await fetch(state.scriptUrl+'?'+params)).json();
    if(json.status!=='ok')throw new Error(json.message);
    if(state.data){const row=state.data.find(r=>r.datum===datum);if(row)row.feedback=tekst;}
    showToast('✓ '+T('notes_save'));closeDayModal();
  }catch(e){showToast('❌ '+e.message);}
}

async function saveDayEdit(datum){
  const titel=document.getElementById('edit-titel')?.value.trim()||'';
  const type=document.getElementById('edit-type')?.value.trim()||'';
  const km=document.getElementById('edit-km')?.value.trim()||'';
  const emoji=document.getElementById('edit-emoji')?.value.trim()||'';
  const detail=document.getElementById('edit-detail')?.value.trim()||'';

  // Update local cache immediately
  if(state.data){
    let row=state.data.find(r=>r.datum===datum);
    if(row){Object.assign(row,{titel,type,km,emoji,detail});}
    else{state.data.push({datum,titel,type,km,emoji,detail,feedback:''});}
  }

  // If connected, try to persist via API
  if(state.scriptUrl){
    try{
      const params=new URLSearchParams({action:'setDay',datum,titel,type,km,emoji,detail});
      if(state.sheetName)params.set('sheetName',state.sheetName);
      await fetch(state.scriptUrl+'?'+params);
    }catch(e){/* silent — local cache updated */}
  }
  showToast(T('saved'));
  closeDayModal();
  renderActiveView();
}

function closeDayModal(e){
  if(e&&e.target!==document.getElementById('dayModal'))return;
  document.getElementById('dayModal').classList.remove('open');

}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar(){
  const el=document.getElementById('calContent');
  const races=loadRaces();
  const y=state.calYear,m=state.calMonth;
  const mf=state.lang==='en'?MONTHS_FULL_EN:MONTHS_FULL_NL;
  const days=state.lang==='en'?DAYS_EN:DAYS_NL;
  const dowOrder=[1,2,3,4,5,6,0];
  const firstDay=new Date(y,m,1);
  const lastDay=new Date(y,m+1,0);
  const startPad=(firstDay.getDay()+6)%7;
  const t=todayStr();
  const cells=[];
  for(let i=0;i<startPad;i++){const d=new Date(y,m,1-startPad+i);cells.push({date:d,other:true});}
  for(let i=1;i<=lastDay.getDate();i++)cells.push({date:new Date(y,m,i),other:false});
  while(cells.length%7!==0){const p=cells[cells.length-1].date;const nd=new Date(p);nd.setDate(p.getDate()+1);cells.push({date:nd,other:true});}

  let h=`<div class="cal-header">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <div class="cal-month-label">${mf[m]} ${y}</div>
